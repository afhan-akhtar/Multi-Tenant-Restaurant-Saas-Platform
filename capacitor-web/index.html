<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Restaurant Tablet</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        text-align: center;
        max-width: 28rem;
        margin: 0 auto;
      }
      code {
        font-size: 0.8rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div>
        <p style="margin: 0 0 0.75rem; font-weight: 600">Capacitor shell only</p>
        <p style="margin: 0; font-size: 0.875rem; line-height: 1.5; opacity: 0.9">
          If you see this inside the app, <code>server.url</code> is missing or out of date. Set it in
          <code>capacitor.config.json</code>, run <code>npx cap sync</code>, rebuild, and ensure
          <code>npm run dev</code> is running on port 3000.
        </p>
      </div>
    </div>
  </body>
</html>
